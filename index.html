<!DOCTYPE html>
<!--
  记账小工具 · 网页版
  怎么用：直接双击本文件，它会用你的浏览器打开，不需要安装任何东西。
  数据存在浏览器自己的仓库（localStorage）里。建议偶尔点一下「导出备份」防止丢失。
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记账小工具</title>
  <style>
    /* ===== 配色和字体集中放这里，想换颜色改这几行就行 ===== */
    :root {
      --bg: #f5f6f8;
      --card: #ffffff;
      --primary: #4f7cff;
      --text: #222;
      --muted: #888;
      --border: #e3e5ea;
      --danger: #e0533d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 16px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, "Segoe UI", "Microsoft YaHei", sans-serif;
      line-height: 1.5;
    }

    .wrap { max-width: 560px; margin: 0 auto; }

    h1 { font-size: 22px; margin: 8px 0 16px; text-align: center; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }

    /* 总额区 */
    .total { font-size: 26px; font-weight: bold; color: var(--primary); }
    .total small { font-size: 14px; color: var(--muted); font-weight: normal; }
    .by-cat { margin-top: 10px; font-size: 14px; color: var(--muted); }
    .by-cat span { display: inline-block; margin-right: 14px; }

    /* 输入区 */
    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .field input {
      width: 100%;
      padding: 10px;
      font-size: 15px;
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .field input:focus { outline: none; border-color: var(--primary); }

    button {
      font-size: 15px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-primary { background: var(--primary); color: #fff; width: 100%; }
    .btn-primary:hover { opacity: 0.9; }

    /* 提示文字 */
    .hint { font-size: 13px; min-height: 18px; margin-top: 6px; }
    .hint.error { color: var(--danger); }

    /* 列表 */
    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .item:last-child { border-bottom: none; }
    .item .left .cat {
      display: inline-block;
      background: #eef2ff;
      color: var(--primary);
      font-size: 12px;
      padding: 1px 8px;
      border-radius: 6px;
      margin-right: 6px;
    }
    .item .left .note { color: var(--text); }
    .item .left .time { display: block; font-size: 12px; color: var(--muted); margin-top: 2px; }
    .item .amount { font-weight: bold; white-space: nowrap; }
    .item .del {
      background: none; color: var(--muted); font-size: 13px; padding: 4px 6px;
    }
    .item .del:hover { color: var(--danger); }
    .empty { color: var(--muted); text-align: center; padding: 16px 0; }

    /* 底部工具按钮 */
    .tools { display: flex; gap: 10px; }
    .tools button { flex: 1; background: #eef0f4; color: var(--text); }
    .tools button:hover { background: #e3e6ec; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>💰 记账小工具</h1>

    <!-- 总额区 -->
    <div class="card">
      <div class="total" id="total">总共花了 0.00 元 <small>（0 笔）</small></div>
      <div class="by-cat" id="byCat"></div>
    </div>

    <!-- 记一笔 -->
    <div class="card">
      <div class="field">
        <label>金额（元）</label>
        <input type="number" id="amount" placeholder="例如 35.5" step="0.01" min="0">
      </div>
      <div class="field">
        <label>分类</label>
        <input type="text" id="category" placeholder="餐饮 / 交通 / 购物…">
      </div>
      <div class="field">
        <label>备注（可不填）</label>
        <input type="text" id="note" placeholder="例如 午饭">
      </div>
      <button class="btn-primary" id="addBtn">记一笔</button>
      <div class="hint" id="hint"></div>
    </div>

    <!-- 列表 -->
    <div class="card">
      <div id="list"></div>
    </div>

    <!-- 备份工具 -->
    <div class="tools">
      <button id="exportBtn">⬇️ 导出备份</button>
      <button id="importBtn">⬆️ 导入备份</button>
      <!-- 真正的文件选择框藏起来，点「导入备份」时触发它 -->
      <input type="file" id="importFile" accept="application/json,.json" hidden>
    </div>
  </div>

  <script>
    // ===== 初始数据：来自原来的 data.json，首次打开时自动带进来 =====
    const SEED = [
      { amount: 35.5, category: "餐饮", note: "午饭",   time: "2026-06-02 00:17" },
      { amount: 20.0, category: "交通", note: "",       time: "2026-06-02 00:17" },
      { amount: 100.0, category: "购物", note: "买书",   time: "2026-06-02 00:17" },
      { amount: 25.9, category: "餐饮", note: "塔斯汀", time: "2026-06-02 00:30" }
    ];

    const STORAGE_KEY = "jizhang_records";

    // 从浏览器仓库读数据；如果是第一次（仓库为空），就把 SEED 写进去
    function load() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw === null) {
        save(SEED);          // 首次迁移：把原有 4 笔存进去
        return SEED.slice();
      }
      try {
        return JSON.parse(raw);
      } catch (e) {
        // 仓库内容坏了就当空账本，避免页面打不开
        alert("读取数据出错，已重置为空账本。");
        return [];
      }
    }

    // 把数据写回浏览器仓库
    function save(records) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
    }

    // 当前账本（内存里的一份），所有操作都改它再 save + render
    let records = load();

    // 把时间格式化成 “2026-06-02 14:30”
    function now() {
      const d = new Date();
      const p = (n) => String(n).padStart(2, "0");
      return `${d.getFullYear()}-${p(d.getMonth() + 1)}-${p(d.getDate())} ` +
             `${p(d.getHours())}:${p(d.getMinutes())}`;
    }

    // 记一笔
    function addRecord() {
      const amountEl = document.getElementById("amount");
      const categoryEl = document.getElementById("category");
      const noteEl = document.getElementById("note");
      const hint = document.getElementById("hint");
      hint.className = "hint";
      hint.textContent = "";

      // 校验金额：必须是大于 0 的数字
      const amount = parseFloat(amountEl.value);
      if (isNaN(amount) || amount <= 0) {
        hint.className = "hint error";
        hint.textContent = "请填一个大于 0 的金额。";
        return;
      }

      const category = categoryEl.value.trim() || "未分类";
      const note = noteEl.value.trim();

      records.push({ amount, category, note, time: now() });
      save(records);
      render();

      // 清空输入框，光标回到金额，方便连续记账
      amountEl.value = "";
      categoryEl.value = "";
      noteEl.value = "";
      amountEl.focus();
      hint.textContent = "✓ 记账成功！";
    }

    // 删除某一笔（按列表里的序号）
    function deleteRecord(index) {
      if (!confirm("确定删除这一笔吗？")) return;
      records.splice(index, 1);
      save(records);
      render();
    }

    // 重画整个界面：总额 + 分类汇总 + 列表
    function render() {
      const totalEl = document.getElementById("total");
      const byCatEl = document.getElementById("byCat");
      const listEl = document.getElementById("list");

      // 1) 总额
      const total = records.reduce((sum, r) => sum + r.amount, 0);
      totalEl.innerHTML = `总共花了 ${total.toFixed(2)} 元 <small>（${records.length} 笔）</small>`;

      // 2) 按分类汇总
      const byCat = {};
      for (const r of records) {
        byCat[r.category] = (byCat[r.category] || 0) + r.amount;
      }
      const cats = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
      byCatEl.innerHTML = cats
        .map(([c, amt]) => `<span>${c}：${amt.toFixed(2)} 元</span>`)
        .join("");

      // 3) 列表（最新的显示在最上面）
      if (records.length === 0) {
        listEl.innerHTML = '<div class="empty">还没有任何消费记录</div>';
        return;
      }
      listEl.innerHTML = records
        .map((r, i) => {
          const note = r.note ? escapeHtml(r.note) : "（无备注）";
          return `
            <div class="item">
              <div class="left">
                <span class="cat">${escapeHtml(r.category)}</span>
                <span class="note">${note}</span>
                <span class="time">${r.time}</span>
              </div>
              <span class="amount">${r.amount.toFixed(2)} 元</span>
              <button class="del" data-index="${i}">删除</button>
            </div>`;
        })
        .reverse()       // 让最新的一笔排在最上面
        .join("");
    }

    // 把用户输入里的特殊字符转义，防止显示出错
    function escapeHtml(s) {
      return s.replace(/[&<>"]/g, (c) =>
        ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    // 导出备份：把数据下载成一个 JSON 文件
    function exportJSON() {
      const text = JSON.stringify(records, null, 2);
      const blob = new Blob([text], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "jizhang-备份.json";
      a.click();
      URL.revokeObjectURL(url);
    }

    // 导入备份：读用户选的 JSON 文件，校验后覆盖当前数据
    function importJSON(file) {
      const reader = new FileReader();
      reader.onload = () => {
        try {
          const data = JSON.parse(reader.result);
          if (!Array.isArray(data)) throw new Error("格式不对");
          if (!confirm("导入会覆盖当前所有数据，确定吗？")) return;
          records = data;
          save(records);
          render();
          alert("导入成功！");
        } catch (e) {
          alert("这个文件不是有效的备份文件。");
        }
      };
      reader.readAsText(file);
    }

    // ===== 把按钮和事件接起来 =====
    document.getElementById("addBtn").addEventListener("click", addRecord);
    document.getElementById("exportBtn").addEventListener("click", exportJSON);
    document.getElementById("importBtn").addEventListener("click", () =>
      document.getElementById("importFile").click());
    document.getElementById("importFile").addEventListener("change", (e) => {
      if (e.target.files.length) importJSON(e.target.files[0]);
      e.target.value = "";   // 清掉，方便下次再选同一个文件
    });
    // 在备注框按回车也能记一笔
    document.getElementById("note").addEventListener("keydown", (e) => {
      if (e.key === "Enter") addRecord();
    });
    // 列表里的「删除」按钮（事件委托：列表是动态生成的）
    document.getElementById("list").addEventListener("click", (e) => {
      if (e.target.classList.contains("del")) {
        deleteRecord(Number(e.target.dataset.index));
      }
    });

    // 页面打开时先画一次
    render();
  </script>
</body>
</html>
