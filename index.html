<!DOCTYPE html>
<!--
  记账小工具 · 网页版（夜间霓虹金融风 + 云端同步）
  数据存在 Supabase 云端，用 Google 登录，手机和电脑同步。
  本地双击 file:// 打开时无法登录，请用线上网址使用。
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记账小工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0e1116;
      --surface:  rgba(255, 255, 255, 0.045);
      --surface2: rgba(255, 255, 255, 0.07);
      --border:   rgba(255, 255, 255, 0.09);
      --text:     #eef2f7;
      --muted:    #8b95a4;
      --neon:     #b6ff3a;
      --neon-ink: #0e1116;
      --ok:       #b6ff3a;
      --warn:     #ffc24b;
      --over:     #ff5d73;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 28px 16px 48px;
      background: var(--bg); color: var(--text);
      font-family: "Sora", -apple-system, "Microsoft YaHei", sans-serif;
      line-height: 1.5; min-height: 100vh; position: relative; overflow-x: hidden;
    }
    body::before, body::after { content: ""; position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; pointer-events: none; }
    body::before { width: 460px; height: 460px; background: radial-gradient(circle, rgba(182,255,58,0.22), transparent 70%); top: -160px; left: -120px; }
    body::after  { width: 420px; height: 420px; background: radial-gradient(circle, rgba(56,189,248,0.16), transparent 70%); bottom: -160px; right: -120px; }

    .wrap { max-width: 560px; margin: 0 auto; position: relative; z-index: 1; }

    .hero { text-align: center; margin: 6px 0 26px; }
    .brand { display: inline-flex; align-items: center; gap: 9px; font-size: 24px; font-weight: 800; letter-spacing: 1px; }
    .brand b { color: var(--neon); font-weight: 800; }
    .brand .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 12px 2px var(--neon); animation: pulse 2.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .tagline { margin: 8px 0 0; color: var(--muted); font-size: 13px; letter-spacing: 2px; }

    .card {
      background: var(--surface); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 16px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      animation: rise .55s cubic-bezier(.2, .7, .2, 1) backwards; animation-delay: calc(var(--i, 0) * 0.08s);
    }
    @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

    .label { display: block; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .total, .amount, .budget-remain, .budget-sub, .by-cat { font-variant-numeric: tabular-nums; }

    .total { font-family: "JetBrains Mono", monospace; font-size: 30px; font-weight: 700; color: var(--text); margin-top: 2px; }
    .total small { font-size: 13px; color: var(--muted); font-weight: 500; font-family: "Sora", sans-serif; }
    .by-cat { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
    .by-cat span { font-size: 13px; color: var(--text); background: var(--surface2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 999px; }

    .card-head { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .budget-set { display: flex; gap: 8px; }
    .budget-set input { width: 118px; padding: 9px 12px; font-size: 14px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 12px; font-family: "JetBrains Mono", monospace; }
    .budget-set button { background: var(--neon); color: var(--neon-ink); font-weight: 700; padding: 9px 16px; border-radius: 12px; }
    .budget-empty { color: var(--muted); font-size: 14px; margin-top: 16px; }
    .budget-hero { margin-top: 16px; }
    .budget-remain-label { display: block; font-size: 13px; color: var(--muted); letter-spacing: 1px; }
    .budget-remain { font-family: "JetBrains Mono", monospace; font-size: 44px; font-weight: 700; line-height: 1.1; display: inline-block; margin-top: 2px; }
    .budget-remain.ok   { color: var(--ok);   text-shadow: 0 0 22px rgba(182, 255, 58, 0.45); }
    .budget-remain.warn { color: var(--warn); text-shadow: 0 0 22px rgba(255, 194, 75, 0.4); }
    .budget-remain.over { color: var(--over); text-shadow: 0 0 22px rgba(255, 93, 115, 0.5); }
    .budget-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .bar { height: 12px; background: rgba(255, 255, 255, 0.06); border-radius: 999px; overflow: hidden; margin: 16px 0 10px; border: 1px solid var(--border); }
    .bar-fill { height: 100%; width: 0; border-radius: 999px; transition: width .6s cubic-bezier(.2, .7, .2, 1); }
    .bar-fill.ok   { background: linear-gradient(90deg, #7ad900, var(--ok));   box-shadow: 0 0 14px rgba(182, 255, 58, 0.6); }
    .bar-fill.warn { background: linear-gradient(90deg, #f0a91f, var(--warn)); box-shadow: 0 0 14px rgba(255, 194, 75, 0.55); }
    .bar-fill.over { background: linear-gradient(90deg, #ff2d50, var(--over)); box-shadow: 0 0 14px rgba(255, 93, 115, 0.6); }
    .budget-msg { font-size: 13px; font-weight: 600; }
    .budget-msg.ok   { color: var(--muted); font-weight: 500; }
    .budget-msg.warn { color: var(--warn); }
    .budget-msg.over { color: var(--over); }

    /* 资金周期 */
    .cycle-actions { display: flex; gap: 8px; }
    .cycle-btn { background: var(--neon); color: var(--neon-ink); font-weight: 700; padding: 8px 14px; border-radius: 12px; font-size: 13px; }
    .cycle-btn.ghost { background: var(--surface); border: 1px solid var(--border); color: var(--muted); font-weight: 600; }
    .cycle-btn.ghost:hover { border-color: var(--over); color: var(--over); }
    .new-cycle-form { margin-top: 16px; padding-top: 16px; border-top: 1px dashed var(--border); }
    .ncf-row { display: flex; gap: 12px; }
    .ncf-row .field { flex: 1; }
    .cycle-range { font-size: 13px; color: var(--muted); margin-top: 12px; }
    .cycle-range b { color: var(--text); font-weight: 600; }
    /* 让原生日期选择控件在深色背景下也清晰 */
    input[type="date"] { color-scheme: dark; font-family: "JetBrains Mono", monospace; }

    /* 数据图表 */
    .chart-block { margin-top: 22px; }
    .chart-block:first-child { margin-top: 8px; }
    .chart-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .pace-text { font-size: 13px; color: var(--muted); margin-top: 6px; text-align: center; line-height: 1.6; }
    .pace-text b { color: var(--text); font-weight: 700; }
    /* ApexCharts 在深色卡片上的微调 */
    .apexcharts-tooltip { font-family: "JetBrains Mono", monospace !important; }
    .apexcharts-legend-text { color: var(--muted) !important; }

    .fields { margin-top: 14px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 5px; }
    .field input { width: 100%; padding: 12px 14px; font-size: 15px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 12px; transition: border-color .2s, box-shadow .2s; }
    .field input::placeholder, .budget-set input::placeholder { color: #5d6675; }
    .field input:focus, .budget-set input:focus { outline: none; border-color: var(--neon); box-shadow: 0 0 0 3px rgba(182, 255, 58, 0.15); }

    /* AI 一句话记账 */
    .ai-row { display: flex; gap: 8px; margin: 14px 0 6px; }
    .ai-row input { flex: 1; min-width: 0; padding: 12px 14px; font-size: 15px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 12px; }
    .ai-row input::placeholder { color: #5d6675; }
    .ai-row input:focus { outline: none; border-color: var(--neon); box-shadow: 0 0 0 3px rgba(182, 255, 58, 0.15); }
    .ai-row button { white-space: nowrap; background: var(--neon); color: var(--neon-ink); font-weight: 700; padding: 0 16px; border-radius: 12px; }
    .ai-row button:disabled { opacity: 0.55; cursor: default; }
    .ai-divider { font-size: 12px; color: var(--muted); text-align: center; margin: 4px 0 2px; letter-spacing: 1px; }

    button { font-family: inherit; font-size: 15px; border: none; border-radius: 12px; cursor: pointer; transition: transform .12s ease, box-shadow .2s, background .2s; }
    button:active { transform: scale(0.98); }
    .btn-primary { width: 100%; padding: 13px; margin-top: 4px; background: var(--neon); color: var(--neon-ink); font-weight: 700; letter-spacing: 0.5px; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(182, 255, 58, 0.3); }

    .hint { font-size: 13px; min-height: 18px; margin-top: 10px; color: var(--neon); }
    .hint.error { color: var(--over); }

    .item { display: flex; align-items: center; gap: 10px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .item:last-child { border-bottom: none; }
    .item .left { flex: 1; min-width: 0; }
    .item .left .cat { display: inline-block; font-size: 12px; font-weight: 600; background: rgba(182, 255, 58, 0.14); color: var(--neon); padding: 2px 9px; border-radius: 999px; margin-right: 8px; }
    .item .left .note { color: var(--text); }
    .item .left .time { display: block; font-size: 12px; color: var(--muted); margin-top: 3px; font-family: "JetBrains Mono", monospace; }
    .item .amount { font-family: "JetBrains Mono", monospace; font-weight: 700; font-size: 16px; white-space: nowrap; }
    .item .del { background: transparent; color: var(--muted); font-size: 13px; padding: 6px 8px; border-radius: 8px; }
    .item .del:hover { color: var(--over); background: rgba(255, 93, 115, 0.1); }
    .item .editdate, .item .editcat { background: transparent; color: var(--muted); font-size: 13px; padding: 6px 8px; border-radius: 8px; }
    .item .editdate:hover, .item .editcat:hover { color: var(--neon); background: rgba(182, 255, 58, 0.1); }
    /* 消费明细：按日期分组 + 列表太长时可滚动 */
    #list { max-height: 460px; overflow-y: auto; }
    .day-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; margin: 18px 0 2px; }
    .day-group:first-child .day-head { margin-top: 2px; }
    .day-head .day-date { font-size: 12px; letter-spacing: 1px; color: var(--muted); font-family: "JetBrains Mono", monospace; }
    .day-head .day-total { font-size: 13px; font-weight: 700; color: var(--neon); font-variant-numeric: tabular-nums; }
    .empty { color: var(--muted); text-align: center; padding: 24px 0; }

    .tools { display: flex; gap: 12px; }
    .tools button { flex: 1; padding: 13px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-weight: 500; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    .tools button:hover { border-color: var(--neon); color: var(--neon); }

    /* 登录界面 */
    .login-card { text-align: center; }
    .login-card p { color: var(--muted); font-size: 14px; margin: 4px 0 18px; }
    .btn-google { width: 100%; padding: 13px; background: #fff; color: #1f2328; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-google:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,255,255,0.15); }
    .btn-google svg { width: 18px; height: 18px; }

    /* 顶部用户条 */
    .userbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 16px; font-size: 13px; color: var(--muted); }
    .userbar .who { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .userbar .logout { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; font-size: 13px; }
    .userbar .logout:hover { border-color: var(--neon); color: var(--neon); }

    ::selection { background: var(--neon); color: var(--neon-ink); }
  </style>
</head>
<body>
  <!-- ===== 登录界面（未登录时显示）===== -->
  <div id="login-view" class="wrap" style="display:none">
    <header class="hero">
      <div class="brand"><span class="dot"></span>MONEY<b>FLOW</b></div>
      <p class="tagline">管住钱包 · 从看清开始</p>
    </header>
    <section class="card login-card" style="--i:1">
      <span class="label">登录</span>
      <p>登录后，你的账本会安全地存在云端，手机和电脑自动同步。</p>
      <button id="googleBtn" class="btn-google">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        使用 Google 登录
      </button>
      <div class="hint" id="loginHint"></div>
    </section>
  </div>

  <!-- ===== 主应用（登录后显示）===== -->
  <div id="app-view" class="wrap" style="display:none">
    <header class="hero">
      <div class="brand"><span class="dot"></span>MONEY<b>FLOW</b></div>
      <p class="tagline">管住钱包 · 从看清开始</p>
    </header>

    <div class="userbar">
      <span class="who" id="userEmail"></span>
      <button class="logout" id="logoutBtn">退出登录</button>
    </div>

    <!-- 本周期预算 -->
    <section class="card" style="--i:1">
      <div class="card-head">
        <span class="label" style="margin:0">💰 本周期</span>
        <div class="cycle-actions">
          <button id="addBudgetBtn" class="cycle-btn ghost" style="display:none">＋ 加钱</button>
          <button id="endCycleBtn" class="cycle-btn ghost" style="display:none">结束本周期</button>
          <button id="newCycleBtn" class="cycle-btn">＋ 开启新周期</button>
        </div>
      </div>
      <div id="budgetBody"></div>
      <!-- 开启新周期的表单：点「开启新周期」才展开 -->
      <div id="newCycleForm" class="new-cycle-form" style="display:none">
        <div class="ncf-row">
          <div class="field">
            <label>本期预算（元）</label>
            <input type="number" id="cycleBudgetInput" placeholder="例如 1500" step="1" min="0">
          </div>
          <div class="field">
            <label>开始日期</label>
            <input type="date" id="cycleStartInput">
          </div>
        </div>
        <button class="btn-primary" id="confirmNewCycleBtn">确认开启新周期</button>
        <div class="hint" id="cycleHint">开启新周期会自动结束上一个；开始日期可往前选，把已经花的也圈进来。</div>
      </div>
    </section>

    <!-- 数据图表（ApexCharts 画） -->
    <section class="card" style="--i:2">
      <span class="label">📊 数据图表</span>
      <div id="chartsBody">
        <div class="chart-block">
          <div class="chart-title">花钱节奏</div>
          <div id="chartPace"></div>
          <div class="pace-text" id="paceText"></div>
        </div>
        <div class="chart-block">
          <div class="chart-title">本周期消费构成</div>
          <div id="chartCat"></div>
        </div>
        <div class="chart-block">
          <div class="chart-title">每日消费</div>
          <div id="chartDaily"></div>
        </div>
        <div class="chart-block">
          <div class="chart-title">周期对比（花费 vs 预算）</div>
          <div id="chartCompare"></div>
        </div>
      </div>
      <div id="chartsEmpty" class="budget-empty" style="display:none">开启资金周期后，这里会显示各种图表 📈</div>
    </section>

    <!-- 累计总额 -->
    <section class="card" style="--i:2">
      <span class="label">累计总支出</span>
      <div class="total" id="total">总共花了 0.00 元 <small>（0 笔）</small></div>
      <div class="by-cat" id="byCat"></div>
    </section>

    <!-- 记一笔 -->
    <section class="card" style="--i:3">
      <span class="label">记一笔</span>
      <div class="ai-row">
        <input type="text" id="aiInput" placeholder="✨ 用一句话记账，如：今天星巴克 38">
        <button id="aiBtn">AI 识别</button>
      </div>
      <div class="hint" id="aiHint"></div>
      <div class="ai-divider">— 或手动填写 —</div>
      <div class="fields">
        <div class="field">
          <label>金额（元）</label>
          <input type="number" id="amount" placeholder="例如 35.5" step="0.01" min="0">
        </div>
        <div class="field">
          <label>分类</label>
          <input type="text" id="category" placeholder="餐饮 / 交通 / 购物…">
        </div>
        <div class="field">
          <label>备注（可不填）</label>
          <input type="text" id="note" placeholder="例如 午饭">
        </div>
        <div class="field">
          <label>日期（补记可改，默认今天）</label>
          <input type="date" id="recordDate">
        </div>
      </div>
      <button class="btn-primary" id="addBtn">＋ 记一笔</button>
      <div class="hint" id="hint"></div>
    </section>

    <!-- 列表 -->
    <section class="card" style="--i:4">
      <span class="label">消费明细</span>
      <div id="list"></div>
    </section>

    <!-- 备份工具 -->
    <div class="tools">
      <button id="exportBtn">⬇ 导出备份</button>
      <button id="importBtn">⬆ 导入备份</button>
      <input type="file" id="importFile" accept="application/json,.json" hidden>
    </div>
  </div>

  <!-- Supabase 官方库（云端数据库 + 登录） -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- ApexCharts：画各种图表的库（环形/柱状/仪表盘），从 CDN 引入、无需安装 -->
  <script src="https://cdn.jsdelivr.net/npm/apexcharts@3.54.1"></script>
  <!-- 核心计算逻辑（纯算钱，和测试共用） -->
  <script src="logic.js"></script>
  <script>
    // ===== 连接 Supabase（这个公开密钥可以放进网页，安全靠数据库的行级权限）=====
    const SUPA_URL = "https://spavepwzzxcslbcxgdbv.supabase.co";
    const SUPA_KEY = "sb_publishable_SQWsdKLj1In6rTgWplSyxQ_IhhACs1F";
    const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY, {
      auth: {
        persistSession: true,       // 记住登录（存到浏览器，刷新不丢）
        autoRefreshToken: true,     // 自动续期
        detectSessionInUrl: true,   // 登录跳转回来时自动取出登录态
        flowType: "pkce",
      },
    });

    // 内存里的数据（从云端读来）
    let records = [];
    let budget = null;        // 上次用过的预算（来自 settings，做新周期的默认建议值）
    let cycles = [];          // 所有资金周期（每个有 start_date / end_date / budget）
    let currentUser = null;

    // 当前时间字符串（用 logic.js 的共用函数）
    function now() { return formatDateTime(new Date()); }
    function currentMonth() { return monthKey(new Date()); }
    function today() { return formatDateTime(new Date()).slice(0, 10); }   // "YYYY-MM-DD"
    function firstOfMonth() { return today().slice(0, 7) + "-01"; }        // 本月 1 号
    // addDays（前后挪天）已移到 logic.js，这里直接用全局函数
    // 当前进行中的周期（没有就返回 null）
    function currentCycle() { return openCycle(cycles); }

    // ===== 登录相关 =====
    function showLogin() {
      document.getElementById("login-view").style.display = "";
      document.getElementById("app-view").style.display = "none";
    }
    function showApp() {
      document.getElementById("login-view").style.display = "none";
      document.getElementById("app-view").style.display = "";
    }

    async function handleSession(session) {
      currentUser = session ? session.user : null;
      if (currentUser) {
        document.getElementById("userEmail").textContent = currentUser.email || "已登录";
        showApp();
        await refresh();
        await maybeMigrateLocal();   // 首次登录时把本地旧数据搬上云端
      } else {
        showLogin();
      }
    }

    async function signInGoogle() {
      const hint = document.getElementById("loginHint");
      hint.className = "hint";
      hint.textContent = "正在跳转到 Google…";
      const { error } = await sb.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: window.location.origin + window.location.pathname },
      });
      if (error) { hint.className = "hint error"; hint.textContent = "登录出错：" + error.message; }
    }

    async function signOut() {
      await sb.auth.signOut();
      records = []; budget = null; cycles = [];
    }

    // ===== 云端读写 =====
    async function loadAll() {
      const { data: exp, error } = await sb
        .from("expenses")
        .select("id, amount, category, note, time")
        .order("time", { ascending: true });
      if (error) { console.error(error); alert("读取数据出错：" + error.message); records = []; }
      else { records = (exp || []).map((r) => ({ ...r, amount: Number(r.amount) })); }

      const { data: s } = await sb.from("settings").select("monthly_budget").maybeSingle();
      budget = s && s.monthly_budget != null ? Number(s.monthly_budget) : null;

      // 读所有资金周期（按开始日期从早到晚）
      const { data: cyc } = await sb
        .from("cycles")
        .select("id, start_date, end_date, budget")
        .order("start_date", { ascending: true });
      cycles = (cyc || []).map((c) => ({ ...c, budget: Number(c.budget) }));
    }

    async function refresh() { await loadAll(); render(); }

    // 首次登录：若本地浏览器存有旧数据、且云端为空，问要不要搬上去
    async function maybeMigrateLocal() {
      const raw = localStorage.getItem("jizhang_records");
      if (!raw) return;
      let local;
      try { local = JSON.parse(raw); } catch (e) { return; }
      if (!Array.isArray(local) || local.length === 0) return;
      if (records.length > 0) return;   // 云端已有数据就不动
      if (!confirm(`发现本地有 ${local.length} 笔旧记录，要上传到云端账本吗？`)) return;
      const rows = local.map((r) => ({
        amount: Number(r.amount), category: r.category || "未分类",
        note: r.note || "", time: r.time || now(),
      }));
      const { error } = await sb.from("expenses").insert(rows);
      if (error) { alert("迁移出错：" + error.message); return; }
      localStorage.removeItem("jizhang_records");   // 搬完清掉，避免重复问
      await refresh();
      alert("旧数据已上传到云端！");
    }

    // ===== AI 一句话记账：调用后端 /api/parse，把识别结果填进下面的表单 =====
    async function aiParse() {
      const aiInput = document.getElementById("aiInput");
      const aiHint = document.getElementById("aiHint");
      const aiBtn = document.getElementById("aiBtn");
      const text = aiInput.value.trim();
      aiHint.className = "hint";
      if (!text) { aiHint.className = "hint error"; aiHint.textContent = "先输入一句话，比如「星巴克 38」"; return; }

      aiBtn.disabled = true;
      aiHint.textContent = "AI 识别中…";
      try {
        const r = await fetch("/api/parse", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text }),
        });
        const data = await r.json().catch(() => ({}));
        if (!r.ok) {
          aiHint.className = "hint error";
          aiHint.textContent = "识别失败：" + (data.error || ("HTTP " + r.status));
          return;
        }
        // 填进下面的表单，等你核对后点「记一笔」
        document.getElementById("amount").value = data.amount ? data.amount : "";
        document.getElementById("category").value = data.category || "";
        document.getElementById("note").value = data.note || "";
        aiHint.textContent = "✓ 已识别，请核对金额/分类后点「记一笔」";
        document.getElementById("amount").focus();
      } catch (e) {
        aiHint.className = "hint error";
        aiHint.textContent = "识别出错（AI 功能需用 Vercel 网址访问）：" + (e.message || e);
      } finally {
        aiBtn.disabled = false;
      }
    }

    // ===== 记一笔 =====
    async function addRecord() {
      const amountEl = document.getElementById("amount");
      const categoryEl = document.getElementById("category");
      const noteEl = document.getElementById("note");
      const hint = document.getElementById("hint");
      hint.className = "hint"; hint.textContent = "";

      if (!isValidAmount(amountEl.value)) {
        hint.className = "hint error"; hint.textContent = "请填一个大于 0 的金额。"; return;
      }
      // 日期：默认今天，可改成补记的那天；时分自动用当前时间补上
      const dateEl = document.getElementById("recordDate");
      const dateStr = (dateEl && dateEl.value) ? dateEl.value : today();
      const timePart = now().slice(11);   // "HH:MM"
      const rec = {
        amount: parseFloat(amountEl.value),
        category: categoryEl.value.trim() || "未分类",
        note: noteEl.value.trim(),
        time: dateStr + " " + timePart,
      };
      // 乐观更新：先在界面上立刻显示，再同步到云端
      const tempId = "temp-" + Date.now();
      records.push({ ...rec, id: tempId });
      render();
      amountEl.value = ""; categoryEl.value = ""; noteEl.value = "";
      // 注意：故意不把日期跳回今天，保留你刚选的日期，方便连着补记同一天的多笔账
      amountEl.focus();
      hint.textContent = "保存中…";

      const { data, error } = await sb.from("expenses").insert(rec).select().single();
      if (error) {
        records = records.filter((r) => r.id !== tempId); render();
        hint.className = "hint error"; hint.textContent = "记账失败：" + error.message; return;
      }
      const i = records.findIndex((r) => r.id === tempId);
      if (i >= 0) records[i] = { ...data, amount: Number(data.amount) };
      render();
      hint.textContent = "✓ 记账成功！";
    }

    // 删除某一笔（按云端记录的 id）
    async function deleteRecord(id) {
      if (!confirm("确定删除这一笔吗？")) return;
      const backup = records.slice();
      records = records.filter((r) => r.id !== id); render();   // 立刻从界面移除
      const { error } = await sb.from("expenses").delete().eq("id", id);
      if (error) { records = backup; render(); alert("删除失败：" + error.message); }
    }

    // 改某一笔的日期（旧账补正）。时分保持不变，只换日期。
    async function editDate(id) {
      const rec = records.find((r) => r.id === id);
      if (!rec) return;
      const cur = dateOf(rec);
      const input = prompt("把这笔的日期改成（格式 2026-06-01）：", cur);
      if (input === null) return;            // 点了取消
      const v = input.trim();
      if (!/^\d{4}-\d{2}-\d{2}$/.test(v) || isNaN(new Date(v + "T00:00:00").getTime())) {
        alert("日期格式不对，应该像 2026-06-01"); return;
      }
      const timePart = (typeof rec.time === "string" && rec.time.length >= 16) ? rec.time.slice(11) : "00:00";
      const newTime = v + " " + timePart;
      const old = rec.time;
      rec.time = newTime; render();          // 乐观更新
      const { error } = await sb.from("expenses").update({ time: newTime }).eq("id", id);
      if (error) { rec.time = old; render(); alert("改日期失败：" + error.message); }
    }

    // 改某一笔的分类（修正记错的分类）
    async function editCategory(id) {
      const rec = records.find((r) => r.id === id);
      if (!rec) return;
      const input = prompt("把这笔的分类改成（如 餐饮 / 交通 / 居住 …）：", rec.category || "");
      if (input === null) return;                  // 点了取消
      const v = input.trim() || "未分类";
      const old = rec.category;
      rec.category = v; render();                   // 乐观更新
      const { error } = await sb.from("expenses").update({ category: v }).eq("id", id);
      if (error) { rec.category = old; render(); alert("改分类失败：" + error.message); }
    }

    // 展开/收起「开启新周期」表单
    function toggleNewCycleForm() {
      const f = document.getElementById("newCycleForm");
      if (f.style.display !== "none") { f.style.display = "none"; return; }
      const bEl = document.getElementById("cycleBudgetInput");
      const sEl = document.getElementById("cycleStartInput");
      bEl.value = (budget != null && !isNaN(budget)) ? budget : "";   // 默认带上次的预算
      // 第一次还没有任何周期时，开始日期默认本月 1 号（把这个月已花的圈进来）；否则默认今天
      sEl.value = cycles.length === 0 ? firstOfMonth() : today();
      document.getElementById("cycleHint").className = "hint";
      f.style.display = "";
      bEl.focus();
    }

    // 确认开启新周期：自动结束上一个，再插入新周期
    async function confirmNewCycle() {
      const bEl = document.getElementById("cycleBudgetInput");
      const sEl = document.getElementById("cycleStartInput");
      const hint = document.getElementById("cycleHint");
      hint.className = "hint";
      if (!isValidAmount(bEl.value)) { hint.className = "hint error"; hint.textContent = "请填一个大于 0 的预算金额。"; return; }
      const budgetVal = parseFloat(bEl.value);
      const startDate = sEl.value || today();
      hint.textContent = "处理中…";

      // 自动结束上一个还开着的周期：结束日 = 新周期开始的前一天（但不早于它自己的开始日）
      const cur = currentCycle();
      if (cur) {
        let end = addDays(startDate, -1);
        if (end < cur.start_date) end = cur.start_date;
        const { error: e1 } = await sb.from("cycles").update({ end_date: end }).eq("id", cur.id);
        if (e1) { hint.className = "hint error"; hint.textContent = "结束上一个周期失败：" + e1.message; return; }
      }
      const { error } = await sb.from("cycles").insert({ start_date: startDate, budget: budgetVal });
      if (error) { hint.className = "hint error"; hint.textContent = "开启失败：" + error.message; return; }
      // 顺便把预算记到 settings，作为下次开周期的默认建议值
      await sb.from("settings").upsert({ user_id: currentUser.id, monthly_budget: budgetVal });
      document.getElementById("newCycleForm").style.display = "none";
      await refresh();
    }

    // 给本周期预算加钱（比如父母转的奖励到账）。填多少就加多少，自动算新总额。
    async function addToBudget() {
      const cur = currentCycle();
      if (!cur) return;
      const input = prompt(`这次到账多少钱？会加到本期预算上。\n（当前预算 ${cur.budget.toFixed(2)} 元）`, "");
      if (input === null) return;                 // 点了取消
      if (!isValidAmount(input)) { alert("请填一个大于 0 的金额。"); return; }
      const old = cur.budget;
      const next = old + parseFloat(input);
      cur.budget = next; render();                // 乐观更新
      const { error } = await sb.from("cycles").update({ budget: next }).eq("id", cur.id);
      if (error) { cur.budget = old; render(); alert("加钱失败：" + error.message); return; }
      // 顺便更新 settings 的默认建议预算
      sb.from("settings").upsert({ user_id: currentUser.id, monthly_budget: next });
    }

    // 结束当前周期（不立刻开新的）
    async function endCurrentCycle() {
      const cur = currentCycle();
      if (!cur) return;
      if (!confirm("确定结束本周期吗？结束后可以随时开启新周期。")) return;
      let end = today();
      if (end < cur.start_date) end = cur.start_date;   // 防止结束日早于开始日
      cur.end_date = end; render();                     // 乐观更新
      const { error } = await sb.from("cycles").update({ end_date: end }).eq("id", cur.id);
      if (error) { cur.end_date = null; render(); alert("结束周期失败：" + error.message); }
    }

    // ===== 画界面 =====
    // 把 "2026-06-01" 显示成 "6月1日"
    function prettyDate(s) {
      if (!s || s.length < 10) return s || "";
      return `${Number(s.slice(5, 7))}月${Number(s.slice(8, 10))}日`;
    }
    // 把 "2026-05-28" 显示成 "2026-05-28 周四"（明细分组标题用）
    function prettyFullDate(s) {
      if (!s || s.length < 10) return s || "";
      const wd = ["日", "一", "二", "三", "四", "五", "六"];
      const dt = new Date(s + "T00:00:00");
      return isNaN(dt.getTime()) ? s : `${s} 周${wd[dt.getDay()]}`;
    }

    function renderBudget() {
      const body = document.getElementById("budgetBody");
      const endBtn = document.getElementById("endCycleBtn");
      const addBtn = document.getElementById("addBudgetBtn");
      const cur = currentCycle();

      // 没有进行中的周期：显示提示（若有上一个已结束的周期，给个小结）
      if (!cur) {
        endBtn.style.display = "none";
        addBtn.style.display = "none";
        const closed = cycles.filter((c) => c.end_date);
        if (closed.length > 0) {
          const last = closed.reduce((a, b) => (a.start_date >= b.start_date ? a : b));
          const spent = sumByCycle(records, last);
          const { remain } = budgetStatus(spent, last.budget);
          const verdict = remain >= 0
            ? `结余 ${remain.toFixed(2)} 元 👍`
            : `超支 ${Math.abs(remain).toFixed(2)} 元`;
          body.innerHTML =
            `<div class="budget-empty">上个周期（${prettyDate(last.start_date)}–${prettyDate(last.end_date)}）` +
            `已结束：花了 ${spent.toFixed(2)} / 预算 ${last.budget.toFixed(2)} 元，${verdict}<br>` +
            `点右上「开启新周期」开始新的一期 👆</div>`;
        } else {
          body.innerHTML = '<div class="budget-empty">还没开启资金周期。点右上「开启新周期」，填好预算和开始日期就能开始管控啦 👆</div>';
        }
        return;
      }

      // 有进行中的周期：算本周期已花、剩余、进度
      endBtn.style.display = "";
      addBtn.style.display = "";
      const spent = sumByCycle(records, cur);
      const { pct, remain, state } = budgetStatus(spent, cur.budget);
      const barWidth = Math.min(pct, 100);
      const remainLabel = remain >= 0 ? "本周期还剩" : "本周期已超支";
      let msg = `已用 ${pct.toFixed(0)}%`;
      if (state === "warn") msg = `⚠️ 快到预算了，悠着点 · 已用 ${pct.toFixed(0)}%`;
      if (state === "over") msg = `🚨 本周期已超支！· 已用 ${pct.toFixed(0)}%`;
      body.innerHTML = `
        <div class="budget-hero">
          <span class="budget-remain-label">${remainLabel}</span>
          <span class="budget-remain ${state}">¥${Math.abs(remain).toFixed(2)}</span>
          <div class="budget-sub">已花 ${spent.toFixed(2)} / 预算 ${cur.budget.toFixed(2)} 元</div>
        </div>
        <div class="bar"><div class="bar-fill ${state}" style="width:${barWidth}%"></div></div>
        <div class="budget-msg ${state}">${msg}</div>
        <div class="cycle-range">本周期：从 <b>${prettyDate(cur.start_date)}</b> 开始（进行中）</div>`;
    }

    // ===== 数据图表（用 ApexCharts 画）=====
    const CAT_COLORS = ["#b6ff3a", "#38bdf8", "#ffc24b", "#ff5d73", "#a78bfa", "#34d399", "#f472b6", "#60a5fa"];
    const C_MUTED = "#8b95a4", C_TEXT = "#eef2f7", C_GRID = "rgba(255,255,255,0.08)";
    const _charts = {};   // 存住已创建的图表实例，方便重画时先销毁

    // 图表通用底子（深色、透明背景、统一字体）
    function baseChart(type, height) {
      return {
        chart: { type, height, background: "transparent", fontFamily: '"JetBrains Mono", monospace',
                 toolbar: { show: false }, animations: { speed: 450 } },
        theme: { mode: "dark" },
        grid: { borderColor: C_GRID },
        tooltip: { theme: "dark" },
        dataLabels: { enabled: false },
      };
    }
    // 销毁某张图（重画前调用，避免重叠/内存泄漏）
    function killChart(key) { if (_charts[key]) { _charts[key].destroy(); _charts[key] = null; } }
    // 在某个容器里画一张图（先清空、销毁旧的）
    function drawChart(key, elId, options) {
      const el = document.getElementById(elId);
      killChart(key);
      el.innerHTML = "";
      _charts[key] = new ApexCharts(el, options);
      _charts[key].render();
    }

    function renderCharts() {
      const cur = currentCycle();
      const body = document.getElementById("chartsBody");
      const empty = document.getElementById("chartsEmpty");

      // 没有进行中的周期：藏起图表区，给个提示
      if (!cur) {
        body.style.display = "none";
        empty.style.display = "";
        ["pace", "cat", "daily", "compare"].forEach(killChart);
        return;
      }
      body.style.display = "";
      empty.style.display = "none";

      const end = cur.end_date || today();
      const cycleRecords = records.filter((r) => inCycle(r, cur));
      const spent = sumByCycle(records, cur);
      const { pct, remain, state } = budgetStatus(spent, cur.budget);
      const stateColor = state === "over" ? "#ff5d73" : state === "warn" ? "#ffc24b" : "#b6ff3a";

      // ① 花钱节奏（仪表盘 + 一句话）
      const daysElapsed = Math.max(1, daysBetween(cur.start_date, today()) + 1);
      const p = pacing(spent, cur.budget, daysElapsed);
      drawChart("pace", "chartPace", {
        ...baseChart("radialBar", 240),
        series: [Math.min(Math.round(pct), 100)],
        labels: ["预算已用"],
        colors: [stateColor],
        stroke: { lineCap: "round" },
        plotOptions: { radialBar: {
          hollow: { size: "60%" },
          track: { background: "rgba(255,255,255,0.08)" },
          dataLabels: {
            name: { color: C_MUTED, fontSize: "13px", offsetY: 22 },
            value: { color: stateColor, fontSize: "30px", fontWeight: 700, offsetY: -18, formatter: (v) => v + "%" },
          },
        }},
      });
      let paceMsg;
      if (p.dailyAvg <= 0) {
        paceMsg = "本周期还没消费，加油保持～";
      } else if (remain < 0) {
        paceMsg = `日均 <b>¥${p.dailyAvg.toFixed(0)}</b>（已 ${daysElapsed} 天）· 🚨 已超支 <b>¥${Math.abs(remain).toFixed(0)}</b>`;
      } else {
        const d = p.daysLeftAtRate;
        const dTxt = isFinite(d) ? `约 <b>${Math.floor(d)}</b> 天` : "很久";
        paceMsg = `日均 <b>¥${p.dailyAvg.toFixed(0)}</b>（已 ${daysElapsed} 天）· 照这花法，剩下预算还能撑${dTxt}`;
      }
      document.getElementById("paceText").innerHTML = paceMsg;

      // ② 本周期消费构成（环形图）
      const cats = sumByCategory(cycleRecords);
      if (cats.length === 0) {
        killChart("cat");
        document.getElementById("chartCat").innerHTML = '<div class="budget-empty">本周期还没有消费记录</div>';
      } else {
        drawChart("cat", "chartCat", {
          ...baseChart("donut", 300),
          series: cats.map((c) => Number(c[1].toFixed(2))),
          labels: cats.map((c) => c[0]),
          colors: CAT_COLORS,
          legend: { position: "bottom", labels: { colors: C_MUTED } },
          dataLabels: { enabled: true, formatter: (v) => v.toFixed(0) + "%", style: { fontSize: "11px" } },
          plotOptions: { pie: { donut: { size: "66%", labels: {
            show: true,
            value: { color: C_TEXT, fontSize: "22px", fontWeight: 700, formatter: (v) => "¥" + Number(v).toFixed(0) },
            total: { show: true, label: "本周期", color: C_MUTED, formatter: () => "¥" + spent.toFixed(0) },
          }}}},
          tooltip: { y: { formatter: (v) => "¥" + v.toFixed(2) } },
          stroke: { colors: ["#0e1116"] },
        });
      }

      // ③ 每日消费（柱状图）
      const daily = dailyTotals(cycleRecords, cur.start_date, end);
      drawChart("daily", "chartDaily", {
        ...baseChart("bar", 240),
        series: [{ name: "当日消费", data: daily.map((d) => Number(d.amount.toFixed(2))) }],
        xaxis: { categories: daily.map((d) => d.date.slice(5)),
                 labels: { style: { colors: C_MUTED, fontSize: "10px" }, rotate: -45, rotateAlways: daily.length > 12, hideOverlappingLabels: true },
                 axisBorder: { show: false }, axisTicks: { show: false } },
        yaxis: { labels: { style: { colors: C_MUTED }, formatter: (v) => v.toFixed(0) } },
        colors: ["#b6ff3a"],
        plotOptions: { bar: { borderRadius: 4, columnWidth: "62%" } },
        fill: { type: "gradient", gradient: { shade: "dark", type: "vertical", gradientToColors: ["#5fae00"], stops: [0, 100], opacityFrom: 0.95, opacityTo: 0.65 } },
        tooltip: { y: { formatter: (v) => "¥" + v.toFixed(2) } },
      });

      // ④ 周期对比（花费 vs 预算，最近 6 期）
      const sorted = cycles.slice().sort((a, b) => (a.start_date < b.start_date ? -1 : 1));
      const recent = sorted.slice(-6);
      drawChart("compare", "chartCompare", {
        ...baseChart("bar", 260),
        series: [
          { name: "花费", data: recent.map((c) => Number(sumByCycle(records, c).toFixed(2))) },
          { name: "预算", data: recent.map((c) => Number(Number(c.budget).toFixed(2))) },
        ],
        xaxis: { categories: recent.map((c) => (c.end_date ? prettyDate(c.start_date) : "本期")),
                 labels: { style: { colors: C_MUTED, fontSize: "11px" } },
                 axisBorder: { show: false }, axisTicks: { show: false } },
        yaxis: { labels: { style: { colors: C_MUTED }, formatter: (v) => v.toFixed(0) } },
        colors: ["#b6ff3a", "#3a4150"],
        plotOptions: { bar: { borderRadius: 4, columnWidth: "58%" } },
        legend: { position: "top", labels: { colors: C_MUTED } },
        tooltip: { y: { formatter: (v) => "¥" + v.toFixed(2) } },
      });
    }

    function render() {
      renderBudget();
      renderCharts(); // 各种图表随记账/删除实时更新
      // 记一笔的日期框：没填时默认今天
      const rd = document.getElementById("recordDate");
      if (rd && !rd.value) rd.value = today();
      const totalEl = document.getElementById("total");
      const byCatEl = document.getElementById("byCat");
      const listEl = document.getElementById("list");

      const total = sumAll(records);
      totalEl.innerHTML = `总共花了 ${total.toFixed(2)} 元 <small>（${records.length} 笔）</small>`;

      const cats = sumByCategory(records);
      byCatEl.innerHTML = cats.map(([c, amt]) => `<span>${escapeHtml(c)} ${amt.toFixed(2)}</span>`).join("");

      if (records.length === 0) {
        listEl.innerHTML = '<div class="empty">还没有任何消费记录</div>';
        return;
      }
      // 按日期把同一天的归到一组（新日期在前；同一天里新记的在前）
      const groups = {};
      for (const r of records) {
        const d = dateOf(r);
        (groups[d] = groups[d] || []).push(r);
      }
      const dates = Object.keys(groups).sort().reverse();
      listEl.innerHTML = dates.map((d) => {
        const dayRecords = groups[d].slice().reverse();
        const dayTotal = dayRecords.reduce((s, r) => s + r.amount, 0);
        const rows = dayRecords.map((r) => {
          const note = r.note ? escapeHtml(r.note) : "（无备注）";
          return `
            <div class="item">
              <div class="left">
                <span class="cat">${escapeHtml(r.category)}</span>
                <span class="note">${note}</span>
              </div>
              <span class="amount">${r.amount.toFixed(2)} 元</span>
              <button class="editcat" data-id="${r.id}">改分类</button>
              <button class="editdate" data-id="${r.id}">改日期</button>
              <button class="del" data-id="${r.id}">删除</button>
            </div>`;
        }).join("");
        return `
          <div class="day-group">
            <div class="day-head">
              <span class="day-date">${prettyFullDate(d)}</span>
              <span class="day-total">共 ${dayTotal.toFixed(2)} 元</span>
            </div>
            ${rows}
          </div>`;
      }).join("");
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    // 导出备份：把当前云端数据下载成 JSON
    function exportJSON() {
      const text = JSON.stringify(records.map(({ amount, category, note, time }) => ({ amount, category, note, time })), null, 2);
      const blob = new Blob([text], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "jizhang-备份.json"; a.click();
      URL.revokeObjectURL(url);
    }

    // 导入备份：把文件里的记录【追加】到云端
    function importJSON(file) {
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const data = JSON.parse(reader.result);
          if (!Array.isArray(data)) throw new Error("格式不对");
          if (!confirm(`将把备份里的 ${data.length} 笔记录添加到你的云端账本，确定吗？`)) return;
          const rows = data.map((r) => ({
            amount: Number(r.amount), category: r.category || "未分类",
            note: r.note || "", time: r.time || now(),
          }));
          const { error } = await sb.from("expenses").insert(rows);
          if (error) throw error;
          await refresh();
          alert("导入成功！");
        } catch (e) {
          alert("导入失败：" + (e.message || "这个文件不是有效的备份文件。"));
        }
      };
      reader.readAsText(file);
    }

    // ===== 事件绑定 =====
    document.getElementById("googleBtn").addEventListener("click", signInGoogle);
    document.getElementById("logoutBtn").addEventListener("click", signOut);
    document.getElementById("addBtn").addEventListener("click", addRecord);
    document.getElementById("aiBtn").addEventListener("click", aiParse);
    document.getElementById("aiInput").addEventListener("keydown", (e) => { if (e.key === "Enter") aiParse(); });
    document.getElementById("newCycleBtn").addEventListener("click", toggleNewCycleForm);
    document.getElementById("endCycleBtn").addEventListener("click", endCurrentCycle);
    document.getElementById("addBudgetBtn").addEventListener("click", addToBudget);
    document.getElementById("confirmNewCycleBtn").addEventListener("click", confirmNewCycle);
    document.getElementById("cycleBudgetInput").addEventListener("keydown", (e) => { if (e.key === "Enter") confirmNewCycle(); });
    document.getElementById("note").addEventListener("keydown", (e) => { if (e.key === "Enter") addRecord(); });
    document.getElementById("exportBtn").addEventListener("click", exportJSON);
    document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
    document.getElementById("importFile").addEventListener("change", (e) => {
      if (e.target.files.length) importJSON(e.target.files[0]);
      e.target.value = "";
    });
    document.getElementById("list").addEventListener("click", (e) => {
      if (e.target.classList.contains("del")) deleteRecord(e.target.dataset.id);
      else if (e.target.classList.contains("editdate")) editDate(e.target.dataset.id);
      else if (e.target.classList.contains("editcat")) editCategory(e.target.dataset.id);
    });

    // ===== 启动：检查登录状态 =====
    // onAuthStateChange 加载时会触发 INITIAL_SESSION，给出浏览器里存的登录态。
    // 关键：用 setTimeout 把后续的数据库调用挪出这个回调——官方明确要求不能在回调里
    // 直接调用其它 supabase 接口，否则会和内部锁死锁，导致刷新后卡住、数据加载不出来。
    sb.auth.onAuthStateChange((_event, session) => {
      setTimeout(() => handleSession(session), 0);
    });
  </script>
</body>
</html>
