<!DOCTYPE html>
<!--
  记账小工具 · 网页版（夜间霓虹金融风 + 云端同步）
  数据存在 Supabase 云端，用 Google 登录，手机和电脑同步。
  本地双击 file:// 打开时无法登录，请用线上网址使用。
-->
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记账小工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:       #0e1116;
      --surface:  rgba(255, 255, 255, 0.045);
      --surface2: rgba(255, 255, 255, 0.07);
      --border:   rgba(255, 255, 255, 0.09);
      --text:     #eef2f7;
      --muted:    #8b95a4;
      --neon:     #b6ff3a;
      --neon-ink: #0e1116;
      --ok:       #b6ff3a;
      --warn:     #ffc24b;
      --over:     #ff5d73;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0; padding: 28px 16px 48px;
      background: var(--bg); color: var(--text);
      font-family: "Sora", -apple-system, "Microsoft YaHei", sans-serif;
      line-height: 1.5; min-height: 100vh; position: relative; overflow-x: hidden;
    }
    body::before, body::after { content: ""; position: fixed; border-radius: 50%; filter: blur(90px); z-index: 0; pointer-events: none; }
    body::before { width: 460px; height: 460px; background: radial-gradient(circle, rgba(182,255,58,0.22), transparent 70%); top: -160px; left: -120px; }
    body::after  { width: 420px; height: 420px; background: radial-gradient(circle, rgba(56,189,248,0.16), transparent 70%); bottom: -160px; right: -120px; }

    .wrap { max-width: 560px; margin: 0 auto; position: relative; z-index: 1; }

    .hero { text-align: center; margin: 6px 0 26px; }
    .brand { display: inline-flex; align-items: center; gap: 9px; font-size: 24px; font-weight: 800; letter-spacing: 1px; }
    .brand b { color: var(--neon); font-weight: 800; }
    .brand .dot { width: 11px; height: 11px; border-radius: 50%; background: var(--neon); box-shadow: 0 0 12px 2px var(--neon); animation: pulse 2.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .tagline { margin: 8px 0 0; color: var(--muted); font-size: 13px; letter-spacing: 2px; }

    .card {
      background: var(--surface); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 16px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.35);
      animation: rise .55s cubic-bezier(.2, .7, .2, 1) backwards; animation-delay: calc(var(--i, 0) * 0.08s);
    }
    @keyframes rise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

    .label { display: block; font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .total, .amount, .budget-remain, .budget-sub, .by-cat { font-variant-numeric: tabular-nums; }

    .total { font-family: "JetBrains Mono", monospace; font-size: 30px; font-weight: 700; color: var(--text); margin-top: 2px; }
    .total small { font-size: 13px; color: var(--muted); font-weight: 500; font-family: "Sora", sans-serif; }
    .by-cat { margin-top: 12px; display: flex; flex-wrap: wrap; gap: 8px; }
    .by-cat span { font-size: 13px; color: var(--text); background: var(--surface2); border: 1px solid var(--border); padding: 3px 10px; border-radius: 999px; }

    .card-head { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .budget-set { display: flex; gap: 8px; }
    .budget-set input { width: 118px; padding: 9px 12px; font-size: 14px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 12px; font-family: "JetBrains Mono", monospace; }
    .budget-set button { background: var(--neon); color: var(--neon-ink); font-weight: 700; padding: 9px 16px; border-radius: 12px; }
    .budget-empty { color: var(--muted); font-size: 14px; margin-top: 16px; }
    .budget-hero { margin-top: 16px; }
    .budget-remain-label { display: block; font-size: 13px; color: var(--muted); letter-spacing: 1px; }
    .budget-remain { font-family: "JetBrains Mono", monospace; font-size: 44px; font-weight: 700; line-height: 1.1; display: inline-block; margin-top: 2px; }
    .budget-remain.ok   { color: var(--ok);   text-shadow: 0 0 22px rgba(182, 255, 58, 0.45); }
    .budget-remain.warn { color: var(--warn); text-shadow: 0 0 22px rgba(255, 194, 75, 0.4); }
    .budget-remain.over { color: var(--over); text-shadow: 0 0 22px rgba(255, 93, 115, 0.5); }
    .budget-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }
    .bar { height: 12px; background: rgba(255, 255, 255, 0.06); border-radius: 999px; overflow: hidden; margin: 16px 0 10px; border: 1px solid var(--border); }
    .bar-fill { height: 100%; width: 0; border-radius: 999px; transition: width .6s cubic-bezier(.2, .7, .2, 1); }
    .bar-fill.ok   { background: linear-gradient(90deg, #7ad900, var(--ok));   box-shadow: 0 0 14px rgba(182, 255, 58, 0.6); }
    .bar-fill.warn { background: linear-gradient(90deg, #f0a91f, var(--warn)); box-shadow: 0 0 14px rgba(255, 194, 75, 0.55); }
    .bar-fill.over { background: linear-gradient(90deg, #ff2d50, var(--over)); box-shadow: 0 0 14px rgba(255, 93, 115, 0.6); }
    .budget-msg { font-size: 13px; font-weight: 600; }
    .budget-msg.ok   { color: var(--muted); font-weight: 500; }
    .budget-msg.warn { color: var(--warn); }
    .budget-msg.over { color: var(--over); }

    .fields { margin-top: 14px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 5px; }
    .field input { width: 100%; padding: 12px 14px; font-size: 15px; background: var(--surface2); color: var(--text); border: 1px solid var(--border); border-radius: 12px; transition: border-color .2s, box-shadow .2s; }
    .field input::placeholder, .budget-set input::placeholder { color: #5d6675; }
    .field input:focus, .budget-set input:focus { outline: none; border-color: var(--neon); box-shadow: 0 0 0 3px rgba(182, 255, 58, 0.15); }

    button { font-family: inherit; font-size: 15px; border: none; border-radius: 12px; cursor: pointer; transition: transform .12s ease, box-shadow .2s, background .2s; }
    button:active { transform: scale(0.98); }
    .btn-primary { width: 100%; padding: 13px; margin-top: 4px; background: var(--neon); color: var(--neon-ink); font-weight: 700; letter-spacing: 0.5px; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(182, 255, 58, 0.3); }

    .hint { font-size: 13px; min-height: 18px; margin-top: 10px; color: var(--neon); }
    .hint.error { color: var(--over); }

    .item { display: flex; align-items: center; gap: 10px; padding: 14px 0; border-bottom: 1px solid var(--border); }
    .item:last-child { border-bottom: none; }
    .item .left { flex: 1; min-width: 0; }
    .item .left .cat { display: inline-block; font-size: 12px; font-weight: 600; background: rgba(182, 255, 58, 0.14); color: var(--neon); padding: 2px 9px; border-radius: 999px; margin-right: 8px; }
    .item .left .note { color: var(--text); }
    .item .left .time { display: block; font-size: 12px; color: var(--muted); margin-top: 3px; font-family: "JetBrains Mono", monospace; }
    .item .amount { font-family: "JetBrains Mono", monospace; font-weight: 700; font-size: 16px; white-space: nowrap; }
    .item .del { background: transparent; color: var(--muted); font-size: 13px; padding: 6px 8px; border-radius: 8px; }
    .item .del:hover { color: var(--over); background: rgba(255, 93, 115, 0.1); }
    .empty { color: var(--muted); text-align: center; padding: 24px 0; }

    .tools { display: flex; gap: 12px; }
    .tools button { flex: 1; padding: 13px; background: var(--surface); border: 1px solid var(--border); color: var(--text); font-weight: 500; backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); }
    .tools button:hover { border-color: var(--neon); color: var(--neon); }

    /* 登录界面 */
    .login-card { text-align: center; }
    .login-card p { color: var(--muted); font-size: 14px; margin: 4px 0 18px; }
    .btn-google { width: 100%; padding: 13px; background: #fff; color: #1f2328; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-google:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(255,255,255,0.15); }
    .btn-google svg { width: 18px; height: 18px; }

    /* 顶部用户条 */
    .userbar { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-bottom: 16px; font-size: 13px; color: var(--muted); }
    .userbar .who { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .userbar .logout { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 6px 12px; font-size: 13px; }
    .userbar .logout:hover { border-color: var(--neon); color: var(--neon); }

    ::selection { background: var(--neon); color: var(--neon-ink); }
  </style>
</head>
<body>
  <!-- ===== 登录界面（未登录时显示）===== -->
  <div id="login-view" class="wrap" style="display:none">
    <header class="hero">
      <div class="brand"><span class="dot"></span>MONEY<b>FLOW</b></div>
      <p class="tagline">管住钱包 · 从看清开始</p>
    </header>
    <section class="card login-card" style="--i:1">
      <span class="label">登录</span>
      <p>登录后，你的账本会安全地存在云端，手机和电脑自动同步。</p>
      <button id="googleBtn" class="btn-google">
        <svg viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        使用 Google 登录
      </button>
      <div class="hint" id="loginHint"></div>
    </section>
  </div>

  <!-- ===== 主应用（登录后显示）===== -->
  <div id="app-view" class="wrap" style="display:none">
    <header class="hero">
      <div class="brand"><span class="dot"></span>MONEY<b>FLOW</b></div>
      <p class="tagline">管住钱包 · 从看清开始</p>
    </header>

    <div class="userbar">
      <span class="who" id="userEmail"></span>
      <button class="logout" id="logoutBtn">退出登录</button>
    </div>

    <!-- 本月预算 -->
    <section class="card" style="--i:1">
      <div class="card-head">
        <span class="label" style="margin:0">📅 本月预算</span>
        <div class="budget-set">
          <input type="number" id="budgetInput" placeholder="设定金额" step="1" min="0">
          <button id="saveBudgetBtn">保存</button>
        </div>
      </div>
      <div id="budgetBody"></div>
    </section>

    <!-- 累计总额 -->
    <section class="card" style="--i:2">
      <span class="label">累计总支出</span>
      <div class="total" id="total">总共花了 0.00 元 <small>（0 笔）</small></div>
      <div class="by-cat" id="byCat"></div>
    </section>

    <!-- 记一笔 -->
    <section class="card" style="--i:3">
      <span class="label">记一笔</span>
      <div class="fields">
        <div class="field">
          <label>金额（元）</label>
          <input type="number" id="amount" placeholder="例如 35.5" step="0.01" min="0">
        </div>
        <div class="field">
          <label>分类</label>
          <input type="text" id="category" placeholder="餐饮 / 交通 / 购物…">
        </div>
        <div class="field">
          <label>备注（可不填）</label>
          <input type="text" id="note" placeholder="例如 午饭">
        </div>
      </div>
      <button class="btn-primary" id="addBtn">＋ 记一笔</button>
      <div class="hint" id="hint"></div>
    </section>

    <!-- 列表 -->
    <section class="card" style="--i:4">
      <span class="label">消费明细</span>
      <div id="list"></div>
    </section>

    <!-- 备份工具 -->
    <div class="tools">
      <button id="exportBtn">⬇ 导出备份</button>
      <button id="importBtn">⬆ 导入备份</button>
      <input type="file" id="importFile" accept="application/json,.json" hidden>
    </div>
  </div>

  <!-- Supabase 官方库（云端数据库 + 登录） -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- 核心计算逻辑（纯算钱，和测试共用） -->
  <script src="logic.js"></script>
  <script>
    // ===== 连接 Supabase（这个公开密钥可以放进网页，安全靠数据库的行级权限）=====
    const SUPA_URL = "https://spavepwzzxcslbcxgdbv.supabase.co";
    const SUPA_KEY = "sb_publishable_SQWsdKLj1In6rTgWplSyxQ_IhhACs1F";
    const sb = window.supabase.createClient(SUPA_URL, SUPA_KEY, {
      auth: {
        persistSession: true,       // 记住登录（存到浏览器，刷新不丢）
        autoRefreshToken: true,     // 自动续期
        detectSessionInUrl: true,   // 登录跳转回来时自动取出登录态
        flowType: "pkce",
        // 关键：用「无操作锁」绕开 supabase-js 的 navigator.locks 死锁，
        // 否则刷新后 getSession() 会卡住导致白屏。单用户场景下这样完全安全。
        lock: (name, acquireTimeout, fn) => fn(),
      },
    });

    // 内存里的数据（从云端读来）
    let records = [];
    let budget = null;        // 本月预算（数字或 null）
    let currentUser = null;

    // 当前时间字符串（用 logic.js 的共用函数）
    function now() { return formatDateTime(new Date()); }
    function currentMonth() { return monthKey(new Date()); }

    // ===== 登录相关 =====
    function showLogin() {
      document.getElementById("login-view").style.display = "";
      document.getElementById("app-view").style.display = "none";
    }
    function showApp() {
      document.getElementById("login-view").style.display = "none";
      document.getElementById("app-view").style.display = "";
    }

    async function handleSession(session) {
      currentUser = session ? session.user : null;
      if (currentUser) {
        document.getElementById("userEmail").textContent = currentUser.email || "已登录";
        showApp();
        await refresh();
        await maybeMigrateLocal();   // 首次登录时把本地旧数据搬上云端
      } else {
        showLogin();
      }
    }

    async function signInGoogle() {
      const hint = document.getElementById("loginHint");
      hint.className = "hint";
      hint.textContent = "正在跳转到 Google…";
      const { error } = await sb.auth.signInWithOAuth({
        provider: "google",
        options: { redirectTo: window.location.origin + window.location.pathname },
      });
      if (error) { hint.className = "hint error"; hint.textContent = "登录出错：" + error.message; }
    }

    async function signOut() {
      await sb.auth.signOut();
      records = []; budget = null;
    }

    // ===== 云端读写 =====
    async function loadAll() {
      const { data: exp, error } = await sb
        .from("expenses")
        .select("id, amount, category, note, time")
        .order("time", { ascending: true });
      if (error) { console.error(error); alert("读取数据出错：" + error.message); records = []; }
      else { records = (exp || []).map((r) => ({ ...r, amount: Number(r.amount) })); }

      const { data: s } = await sb.from("settings").select("monthly_budget").maybeSingle();
      budget = s && s.monthly_budget != null ? Number(s.monthly_budget) : null;
    }

    async function refresh() { await loadAll(); render(); }

    // 首次登录：若本地浏览器存有旧数据、且云端为空，问要不要搬上去
    async function maybeMigrateLocal() {
      const raw = localStorage.getItem("jizhang_records");
      if (!raw) return;
      let local;
      try { local = JSON.parse(raw); } catch (e) { return; }
      if (!Array.isArray(local) || local.length === 0) return;
      if (records.length > 0) return;   // 云端已有数据就不动
      if (!confirm(`发现本地有 ${local.length} 笔旧记录，要上传到云端账本吗？`)) return;
      const rows = local.map((r) => ({
        amount: Number(r.amount), category: r.category || "未分类",
        note: r.note || "", time: r.time || now(),
      }));
      const { error } = await sb.from("expenses").insert(rows);
      if (error) { alert("迁移出错：" + error.message); return; }
      localStorage.removeItem("jizhang_records");   // 搬完清掉，避免重复问
      await refresh();
      alert("旧数据已上传到云端！");
    }

    // ===== 记一笔 =====
    async function addRecord() {
      const amountEl = document.getElementById("amount");
      const categoryEl = document.getElementById("category");
      const noteEl = document.getElementById("note");
      const hint = document.getElementById("hint");
      hint.className = "hint"; hint.textContent = "";

      if (!isValidAmount(amountEl.value)) {
        hint.className = "hint error"; hint.textContent = "请填一个大于 0 的金额。"; return;
      }
      const rec = {
        amount: parseFloat(amountEl.value),
        category: categoryEl.value.trim() || "未分类",
        note: noteEl.value.trim(),
        time: now(),
      };
      // 乐观更新：先在界面上立刻显示，再同步到云端
      const tempId = "temp-" + Date.now();
      records.push({ ...rec, id: tempId });
      render();
      amountEl.value = ""; categoryEl.value = ""; noteEl.value = ""; amountEl.focus();
      hint.textContent = "保存中…";

      const { data, error } = await sb.from("expenses").insert(rec).select().single();
      if (error) {
        records = records.filter((r) => r.id !== tempId); render();
        hint.className = "hint error"; hint.textContent = "记账失败：" + error.message; return;
      }
      const i = records.findIndex((r) => r.id === tempId);
      if (i >= 0) records[i] = { ...data, amount: Number(data.amount) };
      render();
      hint.textContent = "✓ 记账成功！";
    }

    // 删除某一笔（按云端记录的 id）
    async function deleteRecord(id) {
      if (!confirm("确定删除这一笔吗？")) return;
      const backup = records.slice();
      records = records.filter((r) => r.id !== id); render();   // 立刻从界面移除
      const { error } = await sb.from("expenses").delete().eq("id", id);
      if (error) { records = backup; render(); alert("删除失败：" + error.message); }
    }

    // 保存本月预算
    async function setBudget() {
      const input = document.getElementById("budgetInput");
      if (!isValidAmount(input.value)) { alert("请填一个大于 0 的预算金额。"); return; }
      const value = parseFloat(input.value);
      budget = value; renderBudget();   // 立刻更新界面
      const { error } = await sb.from("settings").upsert({ user_id: currentUser.id, monthly_budget: value });
      if (error) { alert("保存预算失败：" + error.message); }
    }

    // ===== 画界面 =====
    function renderBudget() {
      const body = document.getElementById("budgetBody");
      const input = document.getElementById("budgetInput");
      if (budget === null || isNaN(budget)) {
        body.innerHTML = '<div class="budget-empty">还没设本月预算，上面填个金额点「保存」，就能开始管控啦 👆</div>';
        return;
      }
      if (document.activeElement !== input) input.value = budget;
      const spent = sumByMonth(records, currentMonth());
      const { pct, remain, state } = budgetStatus(spent, budget);
      const barWidth = Math.min(pct, 100);
      const remainLabel = remain >= 0 ? "本月还剩" : "本月已超支";
      let msg = `已用 ${pct.toFixed(0)}%`;
      if (state === "warn") msg = `⚠️ 快到预算了，悠着点 · 已用 ${pct.toFixed(0)}%`;
      if (state === "over") msg = `🚨 本月已超支！· 已用 ${pct.toFixed(0)}%`;
      body.innerHTML = `
        <div class="budget-hero">
          <span class="budget-remain-label">${remainLabel}</span>
          <span class="budget-remain ${state}">¥${Math.abs(remain).toFixed(2)}</span>
          <div class="budget-sub">已花 ${spent.toFixed(2)} / 预算 ${budget.toFixed(2)} 元</div>
        </div>
        <div class="bar"><div class="bar-fill ${state}" style="width:${barWidth}%"></div></div>
        <div class="budget-msg ${state}">${msg}</div>`;
    }

    function render() {
      renderBudget();
      const totalEl = document.getElementById("total");
      const byCatEl = document.getElementById("byCat");
      const listEl = document.getElementById("list");

      const total = sumAll(records);
      totalEl.innerHTML = `总共花了 ${total.toFixed(2)} 元 <small>（${records.length} 笔）</small>`;

      const cats = sumByCategory(records);
      byCatEl.innerHTML = cats.map(([c, amt]) => `<span>${escapeHtml(c)} ${amt.toFixed(2)}</span>`).join("");

      if (records.length === 0) {
        listEl.innerHTML = '<div class="empty">还没有任何消费记录</div>';
        return;
      }
      listEl.innerHTML = records.map((r) => {
        const note = r.note ? escapeHtml(r.note) : "（无备注）";
        return `
          <div class="item">
            <div class="left">
              <span class="cat">${escapeHtml(r.category)}</span>
              <span class="note">${note}</span>
              <span class="time">${r.time}</span>
            </div>
            <span class="amount">${r.amount.toFixed(2)} 元</span>
            <button class="del" data-id="${r.id}">删除</button>
          </div>`;
      }).reverse().join("");
    }

    function escapeHtml(s) {
      return String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
    }

    // 导出备份：把当前云端数据下载成 JSON
    function exportJSON() {
      const text = JSON.stringify(records.map(({ amount, category, note, time }) => ({ amount, category, note, time })), null, 2);
      const blob = new Blob([text], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = "jizhang-备份.json"; a.click();
      URL.revokeObjectURL(url);
    }

    // 导入备份：把文件里的记录【追加】到云端
    function importJSON(file) {
      const reader = new FileReader();
      reader.onload = async () => {
        try {
          const data = JSON.parse(reader.result);
          if (!Array.isArray(data)) throw new Error("格式不对");
          if (!confirm(`将把备份里的 ${data.length} 笔记录添加到你的云端账本，确定吗？`)) return;
          const rows = data.map((r) => ({
            amount: Number(r.amount), category: r.category || "未分类",
            note: r.note || "", time: r.time || now(),
          }));
          const { error } = await sb.from("expenses").insert(rows);
          if (error) throw error;
          await refresh();
          alert("导入成功！");
        } catch (e) {
          alert("导入失败：" + (e.message || "这个文件不是有效的备份文件。"));
        }
      };
      reader.readAsText(file);
    }

    // ===== 事件绑定 =====
    document.getElementById("googleBtn").addEventListener("click", signInGoogle);
    document.getElementById("logoutBtn").addEventListener("click", signOut);
    document.getElementById("addBtn").addEventListener("click", addRecord);
    document.getElementById("saveBudgetBtn").addEventListener("click", setBudget);
    document.getElementById("budgetInput").addEventListener("keydown", (e) => { if (e.key === "Enter") setBudget(); });
    document.getElementById("note").addEventListener("keydown", (e) => { if (e.key === "Enter") addRecord(); });
    document.getElementById("exportBtn").addEventListener("click", exportJSON);
    document.getElementById("importBtn").addEventListener("click", () => document.getElementById("importFile").click());
    document.getElementById("importFile").addEventListener("change", (e) => {
      if (e.target.files.length) importJSON(e.target.files[0]);
      e.target.value = "";
    });
    document.getElementById("list").addEventListener("click", (e) => {
      if (e.target.classList.contains("del")) deleteRecord(e.target.dataset.id);
    });

    // ===== 启动：检查登录状态 =====
    sb.auth.onAuthStateChange((_event, session) => handleSession(session));
    sb.auth.getSession()
      .then(({ data }) => handleSession(data.session))
      .catch(() => handleSession(null));
  </script>
</body>
</html>
